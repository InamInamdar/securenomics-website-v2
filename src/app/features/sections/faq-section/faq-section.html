<section class="section-padding bg-white relative overflow-hidden" id="faqs">
  <div class="max-container">
    <!-- Header -->
    <div class="text-center mb-16 animate__animated animate__fadeInUp">
      <span
        class="inline-block px-4 py-1.5 mb-6 text-xs font-semibold tracking-wider text-blue-600 uppercase bg-blue-50 rounded-full border border-blue-100">
        FAQ
      </span>
      <h2 class="text-4xl md:text-5xl font-bold text-slate-900 tracking-tight">
        All You Need to Know
      </h2>
    </div>

    <!-- FAQ Items -->
    <div class="max-w-3xl mx-auto space-y-4">
      @for (faq of faqs(); track $index; let i = $index) {
      <div
        class="group bg-white rounded-2xl border border-slate-100 transition-all duration-300 shadow-sm hover:shadow-lg hover:border-blue-100 hover:-translate-y-0.5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2"
        appAnimateOnScroll="animate__fadeInUp" [animationDelay]="(i + 3) * 100 + 'ms'"
        [class.is-active]="activeIndex() === $index" (click)="toggleItem($index)" tabindex="0"
        (keydown.enter)="toggleItem($index)">
        <!-- Question -->
        <div class="flex items-center justify-between p-6 cursor-pointer">
          <h3
            class="text-lg font-semibold text-slate-800 group-hover:text-blue-600 transition-colors duration-300 pr-8">
            {{ faq.question }}
          </h3>

          <div class="flex-shrink-0 w-6 h-6 flex items-center justify-center transition-transform duration-300"
            [class.rotate-45]="activeIndex() === $index">
            @if (activeIndex() === $index) {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-400 group-hover:text-blue-600" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v12m6-6H6" />
            </svg>
            }
          </div>
        </div>

        <!-- Answer -->
        <div class="overflow-hidden transition-all duration-500 ease-in-out" [class.max-h-0]="activeIndex() !== $index"
          [class.max-h-[500px]]="activeIndex() === $index" [class.opacity-0]="activeIndex() !== $index"
          [class.opacity-100]="activeIndex() === $index">
          <div class="p-6 pt-0 text-slate-600 leading-relaxed">
            {{ faq.answer }}
          </div>
        </div>
      </div>
      }
    </div>
  </div>
</section>
