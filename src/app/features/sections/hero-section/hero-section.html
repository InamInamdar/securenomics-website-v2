<header id="top"
    class="relative overflow-hidden min-h-screen pt-32 lg:pt-48 pb-20 flex items-center bg-cyber-dark text-white">

    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <video #heroVideo [autoplay]="true" [muted]="true" loop playsinline preload="auto"
            class="w-full h-full object-cover">
            <source src="/assets/hero-video.mp4" type="video/mp4">
        </video>

        <!-- Stronger Overlay -->
        <div class="absolute inset-0 bg-[#050c1f]/80"></div>
    </div>

    <div class="max-container relative z-10">
        <div class="max-w-6xl mx-auto text-center" appAnimateOnScroll="animate__fadeInUp">

            <h1 class="text-5xl md:text-6xl font-extrabold leading-[1.05] tracking-tight text-white drop-shadow-2xl">
                The Strategic Distribution Partner for <br />
                <span class="bg-gradient-to-r from-blue-400 to-blue-600 bg-clip-text text-transparent">
                    Modern Cloud Security
                </span>
            </h1>

            <p class="mt-6 text-lg md:text-xl text-slate-200 max-w-3xl mx-auto leading-relaxed">
                Driving awareness, accelerating adoption, and delivering continuous value for partners building with
                Netskope, Cisco Security, Cato Networks, and Cyberhaven.
            </p>

        </div>
    </div>
</header>
